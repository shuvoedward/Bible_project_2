services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bible
      POSTGRES_PASSWORD: "REDACTED"
      POSTGRES_DB: bible
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bible"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.build
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: bible
      DB_PASSWORD: "REDACTED"
      DB_NAME: bible
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["./bible-app", "-env=production"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://bible:05.01.1996sA%40@db:5432/bible?sslmode=disable",
        "up",
      ]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
